<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enread — 法務・サポート</title>
<style>
  :root { --ink:#26241F; --sub:#6B6760; --line:#E4DFD5; --indigo:#33418C; --paper:#FFF6E6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    line-height:1.8; }
  .wrap { max-width:720px; margin:0 auto; padding:48px 20px 64px; }
  .brand { font-family:Georgia,serif; font-size:40px; font-weight:bold; }
  .brand .r { color:var(--indigo); }
  .tag { color:var(--sub); font-size:14px; margin-bottom:28px; }
  a.card { display:block; background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:18px 20px; margin:12px 0; text-decoration:none; color:var(--ink); }
  a.card:hover { border-color:var(--indigo); }
  a.card .t { font-size:16px; font-weight:600; color:var(--indigo); }
  a.card .d { font-size:13px; color:var(--sub); margin-top:2px; }
  footer { margin-top:40px; color:var(--sub); font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">En<span class="r">read</span></div>
  <div class="tag">精読ノート — 法務・サポート情報</div>

  <a class="card" href="terms.html">
    <div class="t">利用規約</div>
    <div class="d">本アプリの利用条件について</div>
  </a>
  <a class="card" href="privacy.html">
    <div class="t">プライバシーポリシー</div>
    <div class="d">情報の取り扱いについて</div>
  </a>
  <a class="card" href="tokusho.html">
    <div class="t">特定商取引法に基づく表記</div>
    <div class="d">販売事業者情報・サブスクリプションについて</div>
  </a>
  <a class="card" href="support.html">
    <div class="t">サポート / FAQ</div>
    <div class="d">よくあるご質問・お問い合わせ</div>
  </a>

  <footer>© 2026 森田真 — Enread</footer>
</div>
</body>
</html>
